<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>NeonVM</title>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Fira+Code:wght@300..700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
			rel="stylesheet"
		/>

		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		/>

		<link rel="stylesheet" href="style.css" />
		<link rel="stylesheet" href="styles/compiler.css" />
		<link rel="stylesheet" href="styles/vm.css" />
		<link rel="stylesheet" href="styles/prism.css" />
		<link rel="icon" type="image/x-icon" href="xenon_atom.png" />
	</head>
	<body>
		<nav>
			<a id="back" href="index.html" title="Back to hub"
				><i class="fa-solid fa-chevron-left"></i
			></a>
			<div class="nav-links">
				<p id="username"></p>
			</div>
		</nav>

		<header>
			<h1 id="title-main">NeonVM</h1>
			<p>
				NeonVM is a version of the Xenon-124 VM with limited
				capabilities.
			</p>
		</header>

		<hr />

		<main>
			<div id="file-nav">
				<div id="save-status"></div>
				<button type="button" title="Create new file">
					<i class="fa-solid fa-circle-plus"></i> Create new file
				</button>
				<ul id="files-list"></ul>
			</div>
			<div id="editor">
				<div id="buttons">
					<button type="button" title="Run" id="btn-run">
						<i class="fa-solid fa-play"></i> Run
					</button>
					<button type="button" title="Compiler" id="btn-compiler">
						<i class="fa-solid fa-gears"></i> Compiler
					</button>
				</div>
				<div>
					<div class="register-container">
						<div class="register">
							<p class="reg-name">AX</p>
							<p class="reg-value" id="reg-AX">0</p>
						</div>
						<div class="register">
							<p class="reg-name">BX</p>
							<p class="reg-value" id="reg-BX">0</p>
						</div>
						<div class="register">
							<p class="reg-name">CX</p>
							<p class="reg-value" id="reg-CX">0</p>
						</div>
						<div class="register">
							<p class="reg-name">DX</p>
							<p class="reg-value" id="reg-DX">0</p>
						</div>
					</div>
					<div class="register-container">
						<div class="register secondary">
							<p class="reg-name">EX</p>
							<p class="reg-value" id="reg-EX">0</p>
						</div>
						<div class="register secondary">
							<p class="reg-name">HP</p>
							<p class="reg-value" id="reg-HP">0</p>
						</div>
						<div class="register secondary">
							<p class="reg-name">SP</p>
							<p class="reg-value" id="reg-SP">0</p>
						</div>
						<div class="register secondary">
							<p class="reg-name">BP</p>
							<p class="reg-value" id="reg-BP">0</p>
						</div>
					</div>
				</div>
			</div>
		</main>

		<button type="button" id="btn-toggle-theme" title="Toggle theme">
			<i class="fa-solid fa-circle-half-stroke"></i>
		</button>

		<script src="scripts/toggleTheme.js"></script>
		<script>
			const urlParams = new URLSearchParams(window.location.search);
			const project = urlParams.get("project") || "";

			document
				.querySelector("#btn-compiler")
				.addEventListener("click", () => {
					window.location.href = `compiler.html?project=${project}`;
				});
		</script>
	</body>
</html>
